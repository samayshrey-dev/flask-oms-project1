{% extends "base.html" %}
{% block title %}Add Product – ShopEase{% endblock %}
{% block content %}
<h2 class="mb-2">Add New Product</h2>

<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-group">
            <label for="name">Product Name *</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>
        </div>
        <div class="form-group">
            <label for="price">Price (₹) *</label>
            <input type="number" id="price" name="price" step="0.01" min="0" required>
        </div>
        <div class="form-group">
            <label for="stock">Stock Quantity *</label>
            <input type="number" id="stock" name="stock" min="0" required>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="e.g. Electronics, Clothing">
        </div>
        <div class="form-group">
            <label for="image_url">Image URL (optional)</label>
            <input type="url" id="image_url" name="image_url" placeholder="https://...">
        </div>
        <button type="submit" class="btn btn-success">Add Product</button>
        <a href="{{ url_for('supplier.products') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
